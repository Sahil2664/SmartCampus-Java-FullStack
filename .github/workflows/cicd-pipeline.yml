name: CI/CD Pipeline - Docker + Maven + GitHub Actions

# Trigger the workflow on push or pull request to main branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Job 1: Build and Test with Maven
  build-and-test:
    name: Build and Test Application
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean compile
      
    - name: Run Unit Tests
      run: mvn test
      
    - name: Package Application
      run: mvn package -DskipTests
      
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: application-jar
        path: target/*.jar
        retention-days: 5

  # Job 2: Docker Build and Push
  docker-build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker Image
      run: |
        docker build -t student-management-system:latest .
        docker build -t student-management-system:${{ github.sha }} .
        
    - name: Run Docker Container (Test)
      run: |
        docker run --name test-container student-management-system:latest
        
    - name: Save Docker Image
      run: |
        docker save student-management-system:latest -o student-management-system.tar
        
    - name: Upload Docker Image Artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: student-management-system.tar
        retention-days: 5

  # Job 3: Code Quality and Security Scan
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Maven Verify
      run: mvn verify
      
    - name: Check Code Style
      run: mvn checkstyle:check || echo "Checkstyle warnings present"

  # Job 4: Deployment Summary
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build, code-quality]
    
    steps:
    - name: Display Deployment Status
      run: |
        echo "===================================="
        echo "CI/CD Pipeline Execution Summary"
        echo "===================================="
        echo "Project: Student Management System"
        echo "Registration: 12307"
        echo "Section: 20M61 - INT332"
        echo ""
        echo "Pipeline Status: SUCCESS"
        echo "Build: ✓ Completed"
        echo "Tests: ✓ Passed"
        echo "Docker: ✓ Built Successfully"
        echo "===================================="
